<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- 10-buttons,heading,paragraphs -->
    <script>

        let pcontainer = document.createElement("div")
        let hcontainer = document.createElement("div")
        let bcontainer = document.createElement("div")

        for (let i = 1; i <= 10; i++) {
            let button = document.createElement("button")
            button.textContent = `btn-${i}`;
            bcontainer.append(button);

            let heading = document.createElement("h1")
            heading.textContent = `heading-${i}`;
            hcontainer.append(heading);

            let para = document.createElement("p")
            para.textContent = `para-${i}`;

            let para2 = document.createElement("h3")
            para2.textContent = "h3---"
            pcontainer.append(para);


        }
        let ref = document.body
        ref.append(bcontainer)
        ref.append(hcontainer)
        ref.append(pcontainer)
    </script>
</body>

</html>
