<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //When button is clicked:
        // Change text
        // Change color
        // Add new element
        let btn = document.createElement("button");

        let btn2 = document.createElement("button");

        btn.textContent = "Click me❤️";
        btn2.textContent = "Btn-2🪴"

        btn.className = "btn1"
        btn2.className = "btn11"



        let text = document.createElement("p");

        text.textContent = "Para...";

        document.body.append(btn,btn2, text);

        // btn.classList.toggle("btn1");

        // let exist = document.getElementById("new");
        let exist = document.querySelector("#new");

        btn.addEventListener("click", function () {
            text.innerText = "Text Changed!"
            text.style.color = "pink"

            //prevent re-creation
            let exist = document.getElementById("new");
            if (!exist) {
                let newEle = document.createElement("h2");

                newEle.textContent = "New element created...";

                newEle.id = "new"
                document.body.append(newEle);
            }
        });



    </script>
</body>

</html>
